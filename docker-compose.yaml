name: rabbit-code-audit

volumes:
  rabbit-code-audit-data:
    name: rabbit-code-audit-data

services:
  rabbit-code-audit-worker-image:
    build:
      context: ./container
      dockerfile: Dockerfile
    image: rabbit-code-audit-worker:latest
    command: ["true"]

  cairn-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: cairn-app
    container_name: rabbit-code-audit-server
    ports:
      - "8000:8000"
    volumes:
      - rabbit-code-audit-data:/root/.local/share/cairn/
    environment:
      CAIRN_DISPATCHER_INTERNAL_URL: "http://cairn-dispatcher:8989"
      # Timeout (seconds) for the longer-running worker connectivity test and
      # config read/write proxy calls to the dispatcher internal API. Independent
      # of CAIRN_DISPATCHER_INTERNAL_TIMEOUT (status polling, default 2.0s).
      # Defaults to 30s in code; set here only to override.
      CAIRN_DISPATCHER_INTERNAL_TEST_TIMEOUT: "30"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/projects', timeout=5)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 3s
    restart: unless-stopped
    command: ["uv", "run", "cairn", "serve", "--host", "0.0.0.0", "--no-access-log"]
  cairn-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile
    image: cairn-app
    container_name: rabbit-code-audit-dispatcher
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dispatch.yaml:/cairn/dispatch.yaml
      - rabbit-code-audit-data:/root/.local/share/cairn/
    environment:
      CAIRN_DISPATCHER_INTERNAL_API: "1"
      CAIRN_DISPATCHER_INTERNAL_HOST: "0.0.0.0"
      CAIRN_DISPATCHER_INTERNAL_PORT: "8989"
    depends_on:
      rabbit-code-audit-worker-image:
        condition: service_completed_successfully
      cairn-server:
        condition: service_healthy
    restart: unless-stopped
    command: ["uv", "run", "cairn", "dispatch", "--config", "dispatch.yaml"]
