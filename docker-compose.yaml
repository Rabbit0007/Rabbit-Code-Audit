name: rabbit-audit

networks:
  default:
    name: rabbit-audit-net

services:
  audit-worker-image:
    build:
      context: ./container
      dockerfile: Dockerfile
    image: rabbit-code-audit-worker:audit
    command: ["true"]

  audit-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: rabbit-code-audit-app:audit
    container_name: rabbit-audit-server
    ports:
      - "8765:8000"
    volumes:
      - /Users/rabbit/.local/share/cairn:/root/.local/share/cairn/
      - /Users/rabbit/.rabbit-code-audit-preview:/Users/rabbit/.rabbit-code-audit-preview
    environment:
      CAIRN_DISPATCHER_INTERNAL_URL: "http://rabbit-audit-dispatcher:8989"
      CAIRN_ARTIFACT_ROOT: "/Users/rabbit/.rabbit-code-audit-preview/artifacts"
      # Timeout (seconds) for the longer-running worker connectivity test and
      # config read/write proxy calls to the dispatcher internal API. Independent
      # of CAIRN_DISPATCHER_INTERNAL_TIMEOUT (status polling, default 2.0s).
      # Defaults to 30s in code; set here only to override.
      CAIRN_DISPATCHER_INTERNAL_TEST_TIMEOUT: "30"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/projects', timeout=5)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 3s
    restart: unless-stopped
    command: ["uv", "run", "cairn", "serve", "--host", "0.0.0.0", "--no-access-log"]
  audit-dispatcher:
    image: rabbit-code-audit-app:audit
    pull_policy: never
    container_name: rabbit-audit-dispatcher
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dispatch.yaml:/cairn/dispatch.yaml
      - /Users/rabbit/.rabbit-code-audit-preview:/Users/rabbit/.rabbit-code-audit-preview
      - /Users/rabbit/.local/share/cairn:/root/.local/share/cairn/
    environment:
      CAIRN_DISPATCHER_INTERNAL_API: "1"
      CAIRN_DISPATCHER_INTERNAL_HOST: "0.0.0.0"
      CAIRN_DISPATCHER_INTERNAL_PORT: "8989"
    depends_on:
      audit-worker-image:
        condition: service_completed_successfully
      audit-server:
        condition: service_healthy
    restart: unless-stopped
    command: ["uv", "run", "cairn", "dispatch", "--config", "dispatch.yaml"]
