server: http://cairn-server:8000
runtime:
  max_workers: 8
  max_running_projects: 3
  max_project_workers: 4
  interval: 3
  healthcheck_timeout: 20
  prompt_group: default
tasks:
  bootstrap:
    timeout: 300
    conclude_timeout: 90
  reason:
    timeout: 300
    max_intents: 2
  explore:
    timeout: 300
    conclude_timeout: 90
container:
  image: rabbit-code-audit-worker:latest
  network_mode: bridge
  completed_action: stop
  cap_add: []
  artifact_volume: rabbit-code-audit-data
  artifact_mount_path: /audit-data
common_env: {}
workers:
- name: mock-audit-worker
  type: mock
  enabled: false
  task_types:
  - bootstrap
  - reason
  - explore
  max_running: 1
  priority: 0
  env: {}
