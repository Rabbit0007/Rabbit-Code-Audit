server: http://cairn-server:8000
runtime:
  max_workers: 8
  max_running_projects: 3
  max_project_workers: 4
  interval: 3
  healthcheck_timeout: 20
  prompt_group: default
tasks:
  bootstrap:
    timeout: 300
    conclude_timeout: 90
  reason:
    timeout: 300
    max_intents: 2
  explore:
    timeout: 300
    conclude_timeout: 90
container:
  image: ghcr.io/oritera/cairn-worker-container:latest
  network_mode: host
  completed_action: stop
  cap_add: []
common_env:
  TSEC_SERVER_HOST: 10.0.0.44:8000
  TSEC_AGENT_TOKEN: xxx
workers:
- name: claudecode_deepseek-v4-pro
  type: claudecode
  enabled: false
  task_types:
  - bootstrap
  - reason
  - explore
  max_running: 2
  priority: 0
  env:
    TSEC_SERVER_HOST: 10.0.0.44:8000
    TSEC_AGENT_TOKEN: xxx
    ANTHROPIC_MODEL: deepseek-v4-pro
    ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
    ANTHROPIC_AUTH_TOKEN: sk-6fe8e73dc03247a4a6a102353bd9a009
- name: claudecode_deepseek-v4-pro-2
