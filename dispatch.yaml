server: http://127.0.0.1:8765
runtime:
  max_workers: 8
  max_running_projects: 3
  max_project_workers: 4
  interval: 3
  healthcheck_timeout: 45
  prompt_group: default
tasks:
  bootstrap:
    timeout: 300
    conclude_timeout: 90
  reason:
    timeout: 300
    max_intents: 2
  explore:
    timeout: 300
    conclude_timeout: 90
  report_enrichment:
    timeout: 120
container:
  image: rabbit-code-audit-worker:latest
  network_mode: bridge
  completed_action: stop
  cap_add: []
  artifact_volume: null
  artifact_host_path: /Users/rabbit/.rabbit-code-audit-preview
  artifact_mount_path: /audit-data
common_env:
  PI_MODEL: deepseek-v4-pro
  PI_BASE_URL: https://api.deepseek.com
  PI_API_KEY: sk-bd01ea5b829246cb8f7a083e2ec1cecb
  PI_PROVIDER_API: openai-completions
